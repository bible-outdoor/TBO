<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Password | The Bible Outdoor Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-login-container">
    <form class="admin-login-form" id="changePasswordForm" autocomplete="off">
      <div class="onboarding-info" style="background:#e6f7ff;border:1px solid #91d5ff;padding:12px 16px;border-radius:7px;margin-bottom:1em;color:#222;font-size:1.04em;">
        <b>Security Notice:</b> For your protection, you must set a new password before accessing the admin dashboard.
      </div>
      <h2 id="formTitle">Change Password</h2>
      <div class="input-icon-wrap">
        <input type="password" id="oldPassword" placeholder="Current Password" required>
        <span id="toggleOldPassword" title="Show/Hide Password">👁️</span>
      </div>
      <div class="input-icon-wrap">
        <input type="password" id="newPassword" placeholder="New Password" required>
        <span id="toggleNewPassword" title="Show/Hide Password">👁️</span>
      </div>
      <div id="password-requirements" style="font-size:0.92em;margin-bottom:0.5em;margin-top:-0.5em;display:block;">
        <div class="requirement" id="length-req">
          <span class="req-icon">○</span> At least 8 characters
        </div>
        <div class="requirement" id="uppercase-req">
          <span class="req-icon">○</span> One uppercase letter
        </div>
        <div class="requirement" id="lowercase-req">
          <span class="req-icon">○</span> One lowercase letter
        </div>
        <div class="requirement" id="number-req">
          <span class="req-icon">○</span> One number
        </div>
        <div class="requirement" id="special-req">
          <span class="req-icon">○</span> One special character
        </div>
      </div>
      <div class="input-icon-wrap">
        <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
        <span id="toggleConfirmPassword" title="Show/Hide Password">👁️</span>
      </div>
      <div id="password-match" style="font-size:0.92em;margin-bottom:0.5em;margin-top:-0.5em;display:none;">
        <div class="requirement" id="match-req">
          <span class="req-icon">○</span> Passwords match
        </div>
      </div>
      <button type="submit" id="formBtn">Change Password</button>
      <div class="admin-login-msg" id="changePasswordMsg"></div>
    </form>
  </div>
  <script>
    document.getElementById('changePasswordForm').onsubmit = async function(e) {
      e.preventDefault();
      const oldPassword = document.getElementById('oldPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const msg = document.getElementById('changePasswordMsg');
      msg.textContent = '';
      // Password requirements: min 8 chars, 1 uppercase, 1 lowercase, 1 number, 1 special char
      const passwordRequirements = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d]).{8,}$/;
      if (!passwordRequirements.test(newPassword)) {
        msg.textContent = 'Password must be at least 8 characters, include uppercase, lowercase, a number, and a special character.';
        return;
      }
      if (newPassword !== confirmPassword) {
        msg.textContent = 'New passwords do not match.';
        return;
      }
      const token = localStorage.getItem('adminToken');
      if (!token) {
        msg.textContent = 'Session expired. Please log in again.';
        setTimeout(() => window.location = 'login.html', 1500);
        return;
      }
      const submitBtn = document.getElementById('formBtn');
      const originalBtnText = submitBtn.textContent;
      
      // Show loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading-spinner"></span> Changing Password...';
      
      try {
        const res = await fetch('https://tbo-qyda.onrender.com/api/users/change-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ oldPassword, newPassword })
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
          msg.textContent = data.message || 'Failed to change password.';
          // Reset button state
          submitBtn.disabled = false;
          submitBtn.textContent = originalBtnText;
          return;
        }
        msg.style.color = 'green';
        msg.textContent = 'Password changed successfully! Redirecting...';
        submitBtn.innerHTML = '<span class="success-icon">✓</span> Success! Redirecting...';
        setTimeout(() => window.location = 'dashboard.html', 1200);
      } catch (err) {
        msg.textContent = 'Network error. Please try again.';
        // Reset button state
        submitBtn.disabled = false;
        submitBtn.textContent = originalBtnText;
      }
    };

    // Real-time password validation
    const newPasswordInput = document.getElementById('newPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const passwordMatch = document.getElementById('password-match');

    // Password requirements validation
    function validatePasswordRequirements(password) {
      const requirements = {
        length: password.length >= 8,
        uppercase: /[A-Z]/.test(password),
        lowercase: /[a-z]/.test(password),
        number: /\d/.test(password),
        special: /[^A-Za-z\d]/.test(password)
      };

      // Update each requirement indicator
      Object.keys(requirements).forEach(req => {
        const element = document.getElementById(`${req}-req`);
        const icon = element.querySelector('.req-icon');
        
        if (requirements[req]) {
          element.style.color = '#4caf50';
          icon.textContent = '✓';
        } else {
          element.style.color = '#888';
          icon.textContent = '○';
        }
      });

      return Object.values(requirements).every(req => req);
    }

    // Password match validation
    function validatePasswordMatch(newPassword, confirmPassword) {
      const matchElement = document.getElementById('match-req');
      const icon = matchElement.querySelector('.req-icon');
      
      if (confirmPassword === '') {
        passwordMatch.style.display = 'none';
        return false;
      }
      
      passwordMatch.style.display = 'block';
      
      if (newPassword === confirmPassword && newPassword !== '') {
        matchElement.style.color = '#4caf50';
        icon.textContent = '✓';
        return true;
      } else {
        matchElement.style.color = '#f44336';
        icon.textContent = '✗';
        return false;
      }
    }

    // Real-time validation event listeners
    newPasswordInput.addEventListener('input', function() {
      const password = this.value;
      validatePasswordRequirements(password);
      
      // Also check match if confirm password has been entered
      const confirmPassword = confirmPasswordInput.value;
      if (confirmPassword) {
        validatePasswordMatch(password, confirmPassword);
      }
    });

    confirmPasswordInput.addEventListener('input', function() {
      const confirmPassword = this.value;
      const newPassword = newPasswordInput.value;
      validatePasswordMatch(newPassword, confirmPassword);
    });

    // Password visibility toggles for change password form
    const oldPassword = document.getElementById('oldPassword');
    const toggleOldPassword = document.getElementById('toggleOldPassword');
    if (oldPassword && toggleOldPassword) {
      toggleOldPassword.addEventListener('click', function() {
        if (oldPassword.type === 'password') {
          oldPassword.type = 'text';
          toggleOldPassword.textContent = '🙈';
        } else {
          oldPassword.type = 'password';
          toggleOldPassword.textContent = '👁️';
        }
      });
    }
    const newPassword = document.getElementById('newPassword');
    const toggleNewPassword = document.getElementById('toggleNewPassword');
    if (newPassword && toggleNewPassword) {
      toggleNewPassword.addEventListener('click', function() {
        if (newPassword.type === 'password') {
          newPassword.type = 'text';
          toggleNewPassword.textContent = '🙈';
        } else {
          newPassword.type = 'password';
          toggleNewPassword.textContent = '👁️';
        }
      });
    }
    const confirmPassword = document.getElementById('confirmPassword');
    const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
    if (confirmPassword && toggleConfirmPassword) {
      toggleConfirmPassword.addEventListener('click', function() {
        if (confirmPassword.type === 'password') {
          confirmPassword.type = 'text';
          toggleConfirmPassword.textContent = '🙈';
        } else {
          confirmPassword.type = 'password';
          toggleConfirmPassword.textContent = '👁️';
        }
      });
    }
  </script>
</body>
</html>
